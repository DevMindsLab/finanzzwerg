<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#312e81"/>

  <!-- Hat (pointy gnome/dwarf hat) -->
  <polygon points="16,2 7.5,15 24.5,15" fill="#dc2626"/>
  <polygon points="16,2 16,15 24.5,15" fill="#ef4444"/>
  <!-- Hat brim -->
  <rect x="6.5" y="13.5" width="19" height="3.2" rx="1.6" fill="#991b1b"/>
  <!-- Hat buckle -->
  <rect x="13.2" y="14" width="5.6" height="2.2" rx="0.6" fill="#fbbf24"/>
  <rect x="14.5" y="14.3" width="3" height="1.6" rx="0.3" fill="#92400e"/>

  <!-- Beard -->
  <ellipse cx="16" cy="28.5" rx="8.5" ry="5.5" fill="#f1f5f9"/>
  <ellipse cx="16" cy="27" rx="6.5" ry="4" fill="#e2e8f0"/>

  <!-- Face -->
  <circle cx="16" cy="19.5" r="5.8" fill="#fde68a"/>

  <!-- Rosy cheeks -->
  <circle cx="11.5" cy="21" r="2" fill="#fca5a5" opacity="0.55"/>
  <circle cx="20.5" cy="21" r="2" fill="#fca5a5" opacity="0.55"/>

  <!-- Eyes -->
  <circle cx="13.8" cy="18.5" r="1.3" fill="#1e1b4b"/>
  <circle cx="18.2" cy="18.5" r="1.3" fill="#1e1b4b"/>
  <circle cx="14.2" cy="18" r="0.45" fill="white"/>
  <circle cx="18.6" cy="18" r="0.45" fill="white"/>

  <!-- Nose -->
  <ellipse cx="16" cy="20.8" rx="1.1" ry="0.85" fill="#f59e0b"/>

  <!-- Smile -->
  <path d="M 13.5 22.5 Q 16 24.2 18.5 22.5" stroke="#92400e" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows (bushy dwarf brows) -->
  <path d="M 12.3 17 Q 14 16.2 15.3 17" stroke="#92400e" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <path d="M 16.7 17 Q 18 16.2 19.7 17" stroke="#92400e" stroke-width="1.1" fill="none" stroke-linecap="round"/>
</svg>
